<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23667eea'/%3E%3Ctext x='50' y='68' font-size='50' text-anchor='middle' fill='white' font-family='Arial'%3E📢%3C/text%3E%3C/svg%3E">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MiniGram — мессенджер с каналами и группами</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            min-height: 100vh;
        }

        .chat-container {
            display: flex;
            height: 100vh;
            background: #0f0f0f;
        }

        .users-panel {
            width: 300px;
            background: #1a1a1a;
            border-right: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
        }

        .user-info {
            padding: 20px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
        }

        .user-details h3 {
            color: white;
            font-size: 16px;
        }

        .user-details p {
            color: #888;
            font-size: 12px;
        }

        .online-status {
            color: #28a745;
            font-size: 10px;
            margin-top: 4px;
        }

        .panel-tabs {
            display: flex;
            border-bottom: 1px solid #2a2a2a;
        }

        .panel-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .panel-tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
        }

        .panel-content.hidden {
            display: none;
        }

        .dialog-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #2a2a2a;
        }

        .dialog-item:hover {
            background: #2a2a2a;
        }

        .dialog-item.active {
            background: #2a2a2a;
            border-left: 3px solid #667eea;
        }

        .dialog-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
        }

        .dialog-avatar.channel {
            background: #ff6b6b;
        }

        .dialog-avatar.group {
            background: #28a745;
        }

        .dialog-info {
            flex: 1;
        }

        .dialog-name {
            color: white;
            font-weight: bold;
            font-size: 15px;
        }

        .dialog-type {
            font-size: 10px;
            color: #888;
            margin-top: 2px;
        }

        .create-btn {
            margin: 15px;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f0f0f;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1a1a1a;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .chat-header-info h3 {
            color: white;
            font-size: 16px;
        }

        .chat-header-info p {
            color: #888;
            font-size: 12px;
        }

        .chat-header-info .member-count {
            font-size: 10px;
            color: #667eea;
            margin-top: 2px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            word-wrap: break-word;
            animation: fadeInUp 0.2s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.my-message {
            background: #667eea;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.other-message {
            background: #2a2a2a;
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-sender {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.6;
            text-align: right;
        }

        .message-input-area {
            padding: 20px;
            border-top: 1px solid #2a2a2a;
            display: flex;
            gap: 12px;
            background: #1a1a1a;
        }

        .message-input-area input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 30px;
            border: none;
            background: #2a2a2a;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .message-input-area input:disabled {
            opacity: 0.5;
        }

        .message-input-area button {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .message-input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.hidden {
            display: none;
        }

        .modal-box {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
        }

        .modal-box h3 {
            color: white;
            margin-bottom: 20px;
        }

        .modal-box input {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: none;
            background: #2a2a2a;
            color: white;
            margin-bottom: 15px;
        }

        .modal-box button {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: none;
            background: #667eea;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .modal-buttons button {
            flex: 1;
        }

        .modal-buttons .cancel {
            background: #ff4757;
        }

        .register-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .register-box {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .register-box h2 {
            color: white;
            margin-bottom: 10px;
        }

        .register-box p {
            color: #888;
            margin-bottom: 30px;
        }

        .register-box input {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: #2a2a2a;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .register-box button {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .users-panel {
                position: fixed;
                left: -300px;
                top: 0;
                height: 100%;
                z-index: 200;
                transition: left 0.3s;
            }
            .users-panel.open {
                left: 0;
            }
            .menu-btn {
                display: block;
                position: fixed;
                top: 20px;
                left: 20px;
                z-index: 300;
                background: #667eea;
                border: none;
                color: white;
                font-size: 24px;
                padding: 10px 15px;
                border-radius: 30px;
                cursor: pointer;
            }
        }

        @media (min-width: 769px) {
            .menu-btn {
                display: none;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="registerOverlay" class="register-overlay">
        <div class="register-box">
            <h2>✨ MiniGram</h2>
            <p>Мессенджер с каналами и группами</p>
            <input type="text" id="nicknameInput" placeholder="Придумай никнейм" maxlength="20">
            <button id="registerBtn">🚀 Начать</button>
            <div id="registerError" style="color:#ff4757; font-size:12px; margin-top:10px;"></div>
        </div>
    </div>

    <div class="chat-container" style="display: none;" id="chatContainer">
        <button class="menu-btn" id="menuBtn">☰</button>

        <div class="users-panel" id="usersPanel">
            <div class="user-info">
                <div class="user-avatar" id="myAvatar">😀</div>
                <div class="user-details">
                    <h3 id="myNickname">Загрузка...</h3>
                    <div class="online-status">🟢 Онлайн</div>
                </div>
            </div>

            <div class="panel-tabs">
                <button class="panel-tab active" data-tab="chats">💬 Чаты</button>
                <button class="panel-tab" data-tab="channels">📢 Каналы</button>
                <button class="panel-tab" data-tab="groups">👥 Группы</button>
            </div>

            <div id="chatsPanel" class="panel-content">
                <div class="dialogs-list" id="dialogsList">
                    <div style="padding: 20px; color: #888; text-align: center;">Загрузка...</div>
                </div>
            </div>

            <div id="channelsPanel" class="panel-content hidden">
                <button class="create-btn" id="createChannelBtn">➕ Создать канал</button>
                <div class="dialogs-list" id="channelsList">
                    <div style="padding: 20px; color: #888; text-align: center;">Нет каналов</div>
                </div>
            </div>

            <div id="groupsPanel" class="panel-content hidden">
                <button class="create-btn" id="createGroupBtn">➕ Создать группу</button>
                <div class="dialogs-list" id="groupsList">
                    <div style="padding: 20px; color: #888; text-align: center;">Нет групп</div>
                </div>
            </div>
        </div>

        <div class="chat-main">
            <div class="chat-header" id="chatHeader" style="display: none;">
                <div class="chat-header-avatar" id="chatAvatar">😀</div>
                <div class="chat-header-info">
                    <h3 id="chatUserName">Выберите чат</h3>
                    <p id="chatUserStatus"></p>
                    <div class="member-count" id="memberCount"></div>
                </div>
            </div>

            <div class="messages-area" id="messagesArea">
                <div style="text-align: center; color: #888; padding: 40px;">
                    👈 Выберите чат из списка
                </div>
            </div>

            <div class="message-input-area" style="display: none;" id="messageInputArea">
                <input type="text" id="messageInput" placeholder="Напиши сообщение..." maxlength="500">
                <button id="sendBtn">📤 Отправить</button>
            </div>
        </div>
    </div>

    <div id="createModal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3 id="modalTitle">Создать канал</h3>
            <input type="text" id="modalName" placeholder="Название">
            <input type="text" id="modalDesc" placeholder="Описание (необязательно)">
            <div class="modal-buttons">
                <button id="modalCreateBtn">Создать</button>
                <button id="modalCancelBtn" class="cancel">Отмена</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <script>
        // ========== FIREBASE КЛЮЧИ (ВСТАВЬ СВОИ) ==========
        const firebaseConfig = {
  apiKey: "AIzaSyCKod1JVM2fp6kbCHfYdbAFJgTOHg8Kzfk",
  authDomain: "sitemaker-c4226.firebaseapp.com",
  projectId: "sitemaker-c4226",
  storageBucket: "sitemaker-c4226.firebasestorage.app",
  messagingSenderId: "1044402198283",
  appId: "1:1044402198283:web:504fd7e7a4199eb8de340e"
};
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        // ========== ПЕРЕМЕННЫЕ ==========
        let myId = null;
        let myNickname = null;
        let currentChatId = null;
        let currentChatType = null;
        let users = {};
        let channels = {};
        let groups = {};
        let currentMessagesRef = null;
        
        const avatars = ['😀', '😎', '🥳', '😺', '🦊', '🐼', '🌟', '🎮', '⚽', '🎵', '📚', '🎨'];
        
        function getRandomAvatar() {
            return avatars[Math.floor(Math.random() * avatars.length)];
        }
        
        // ========== РЕГИСТРАЦИЯ ==========
        function register() {
            const nickname = document.getElementById('nicknameInput').value.trim();
            const errorDiv = document.getElementById('registerError');
            
            if (!nickname || nickname.length < 2) {
                errorDiv.textContent = '❌ Введи никнейм (минимум 2 символа)';
                return;
            }
            
            myId = Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            myNickname = nickname;
            
            const userData = {
                id: myId,
                nickname: myNickname,
                avatar: getRandomAvatar(),
                online: true,
                lastSeen: Date.now()
            };
            
            database.ref('users/' + myId).set(userData);
            localStorage.setItem('minigram_user', JSON.stringify({ id: myId, nickname: myNickname }));
            
            document.getElementById('registerOverlay').style.display = 'none';
            document.getElementById('chatContainer').style.display = 'flex';
            document.getElementById('myNickname').textContent = myNickname;
            document.getElementById('myAvatar').textContent = userData.avatar;
            
            initApp();
        }
        
        function checkExistingUser() {
            const saved = localStorage.getItem('minigram_user');
            if (saved) {
                const user = JSON.parse(saved);
                myId = user.id;
                myNickname = user.nickname;
                database.ref('users/' + myId).update({ online: true, lastSeen: Date.now() });
                document.getElementById('registerOverlay').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'flex';
                document.getElementById('myNickname').textContent = myNickname;
                initApp();
            }
        }
        
        // ========== ЗАГРУЗКА ДАННЫХ ==========
        function loadUsers() {
            database.ref('users').on('value', (snapshot) => {
                users = snapshot.val() || {};
                renderDialogs();
            });
        }
        
        function loadChannels() {
            database.ref('channels').on('value', (snapshot) => {
                channels = snapshot.val() || {};
                renderChannels();
            });
        }
        
        function loadGroups() {
            database.ref('groups').on('value', (snapshot) => {
                groups = snapshot.val() || {};
                renderGroups();
            });
        }
        
        // ========== ОТОБРАЖЕНИЕ ==========
        function renderDialogs() {
            const container = document.getElementById('dialogsList');
            if (!container) return;
            
            const usersList = Object.values(users).filter(u => u.id !== myId);
            
            if (usersList.length === 0) {
                container.innerHTML = '<div style="padding: 20px; color: #888; text-align: center;">👥 Нет других пользователей<br><small>Поделись ссылкой с друзьями!</small></div>';
                return;
            }
            
            container.innerHTML = usersList.map(user => `
                <div class="dialog-item ${currentChatId === user.id && currentChatType === 'user' ? 'active' : ''}" onclick="selectChat('${user.id}', 'user')">
                    <div class="dialog-avatar">${user.avatar || '😀'}</div>
                    <div class="dialog-info">
                        <div class="dialog-name">${escapeHtml(user.nickname)}</div>
                        <div class="dialog-type">💬 Личный чат</div>
                        <div class="dialog-last-message">${user.online ? '🟢 Онлайн' : '⚫ Офлайн'}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderChannels() {
            const container = document.getElementById('channelsList');
            if (!container) return;
            
            const channelsList = Object.values(channels);
            
            if (channelsList.length === 0) {
                container.innerHTML = '<div style="padding: 20px; color: #888; text-align: center;">📢 Нет каналов<br><small>Создай первый канал!</small></div>';
                return;
            }
            
            container.innerHTML = channelsList.map(channel => `
                <div class="dialog-item ${currentChatId === channel.id && currentChatType === 'channel' ? 'active' : ''}" onclick="selectChat('${channel.id}', 'channel')">
                    <div class="dialog-avatar channel">📢</div>
                    <div class="dialog-info">
                        <div class="dialog-name">${escapeHtml(channel.name)}</div>
                        <div class="dialog-type">📢 Канал • Подписчиков: ${channel.members ? Object.keys(channel.members).length : 1}</div>
                        <div class="dialog-last-message">${escapeHtml(channel.description || 'Нет описания')}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderGroups() {
            const container = document.getElementById('groupsList');
            if (!container) return;
            
            const groupsList = Object.values(groups);
            
            if (groupsList.length === 0) {
                container.innerHTML = '<div style="padding: 20px; color: #888; text-align: center;">👥 Нет групп<br><small>Создай первую группу!</small></div>';
                return;
            }
            
            container.innerHTML = groupsList.map(group => `
                <div class="dialog-item ${currentChatId === group.id && currentChatType === 'group' ? 'active' : ''}" onclick="selectChat('${group.id}', 'group')">
                    <div class="dialog-avatar group">👥</div>
                    <div class="dialog-info">
                        <div class="dialog-name">${escapeHtml(group.name)}</div>
                        <div class="dialog-type">👥 Группа • Участников: ${group.members ? Object.keys(group.members).length : 1}</div>
                        <div class="dialog-last-message">${escapeHtml(group.description || 'Нет описания')}</div>
                    </div>
                </div>
            `).join('');
        }
        
        // ========== ВЫБОР ЧАТА ==========
        window.selectChat = function(id, type) {
            // Отписываемся от старых сообщений
            if (currentMessagesRef) {
                currentMessagesRef.off();
            }
            
            currentChatId = id;
            currentChatType = type;
            
            // Обновляем активные элементы в списках
            renderDialogs();
            renderChannels();
            renderGroups();
            
            let name = '', avatar = '😀', status = '', memberCount = '';
            
            if (type === 'user' && users[id]) {
                name = users[id].nickname;
                avatar = users[id].avatar || '😀';
                status = users[id].online ? '🟢 Онлайн' : '⚫ Офлайн';
            } else if (type === 'channel' && channels[id]) {
                name = channels[id].name;
                avatar = '📢';
                status = '📢 Канал';
                const membersCount = channels[id].members ? Object.keys(channels[id].members).length : 1;
                memberCount = `👥 Подписчиков: ${membersCount}`;
                const isAdmin = channels[id].creator === myId;
                status = isAdmin ? '👑 Вы администратор канала' : '📢 Только для чтения';
            } else if (type === 'group' && groups[id]) {
                name = groups[id].name;
                avatar = '👥';
                status = '👥 Группа';
                const membersCount = groups[id].members ? Object.keys(groups[id].members).length : 1;
                memberCount = `👥 Участников: ${membersCount}`;
            }
            
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('messageInputArea').style.display = 'flex';
            document.getElementById('chatUserName').textContent = name;
            document.getElementById('chatAvatar').textContent = avatar;
            document.getElementById('chatUserStatus').textContent = status;
            document.getElementById('memberCount').textContent = memberCount;
            
            // Очищаем область сообщений
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.innerHTML = '';
            
            // В каналах нельзя писать обычным пользователям
            const isChannel = type === 'channel';
            const isChannelAdmin = isChannel && channels[id] && channels[id].creator === myId;
            const canWrite = !isChannel || isChannelAdmin;
            
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            
            if (messageInput) {
                messageInput.disabled = !canWrite;
                messageInput.placeholder = canWrite ? 'Напиши сообщение...' : '🔒 В этом канале только администратор может писать';
            }
            if (sendBtn) sendBtn.disabled = !canWrite;
            
            // Загружаем сообщения
            loadMessages();
        };
        
        // ========== СООБЩЕНИЯ ==========
        function getChatRef() {
            if (!currentChatId || !currentChatType) return null;
            if (currentChatType === 'user') {
                const chatId = [myId, currentChatId].sort().join('_');
                return database.ref('messages/users/' + chatId);
            }
            if (currentChatType === 'channel') return database.ref('messages/channels/' + currentChatId);
            if (currentChatType === 'group') return database.ref('messages/groups/' + currentChatId);
            return null;
        }
        
        function loadMessages() {
            const chatRef = getChatRef();
            if (!chatRef) return;
            
            currentMessagesRef = chatRef;
            
            // Загружаем последние 50 сообщений
            chatRef.limitToLast(50).once('value', (snapshot) => {
                const messages = snapshot.val();
                if (messages) {
                    const messagesArray = Object.values(messages);
                    messagesArray.forEach(message => {
                        displayMessage(message);
                    });
                }
            });
            
            // Слушаем новые сообщения
            chatRef.on('child_added', (snapshot) => {
                const message = snapshot.val();
                // Проверяем, не добавлено ли уже это сообщение
                const existingMsg = document.querySelector(`[data-msg-id="${message.id}"]`);
                if (!existingMsg) {
                    displayMessage(message);
                }
            });
        }
        
        function displayMessage(message) {
            const container = document.getElementById('messagesArea');
            if (!container) return;
            
            const isMyMessage = message.senderId === myId;
            const date = new Date(message.timestamp);
            const timeStr = `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isMyMessage ? 'my-message' : 'other-message'}`;
            messageDiv.setAttribute('data-msg-id', message.id);
            messageDiv.innerHTML = `
                ${!isMyMessage ? `<div class="message-sender">${escapeHtml(message.senderNickname)}</div>` : ''}
                ${escapeHtml(message.text)}
                <div class="message-time">${timeStr}</div>
            `;
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentChatId || !currentChatType) return;
            
            // Проверка прав в канале
            if (currentChatType === 'channel') {
                const channel = channels[currentChatId];
                if (channel && channel.creator !== myId) {
                    alert('🔒 Только администратор может писать в канале');
                    return;
                }
            }
            
            const message = {
                id: Date.now() + '_' + Math.random(),
                senderId: myId,
                senderNickname: myNickname,
                text: text,
                timestamp: Date.now()
            };
            
            const chatRef = getChatRef();
            if (chatRef) {
                chatRef.push(message);
                input.value = '';
            }
        }
        
        // ========== СОЗДАНИЕ КАНАЛА/ГРУППЫ ==========
        let createType = null;
        
        function showCreateModal(type) {
            createType = type;
            document.getElementById('modalTitle').textContent = type === 'channel' ? '📢 Создать канал' : '👥 Создать группу';
            document.getElementById('modalName').value = '';
            document.getElementById('modalDesc').value = '';
            document.getElementById('createModal').classList.remove('hidden');
        }
        
        function createChannelOrGroup() {
            const name = document.getElementById('modalName').value.trim();
            const desc = document.getElementById('modalDesc').value.trim();
            
            if (!name) {
                alert('Введите название!');
                return;
            }
            
            const data = {
                id: Date.now() + '_' + Math.random(),
                name: name,
                description: desc,
                creator: myId,
                createdAt: Date.now(),
                members: { [myId]: true }
            };
            
            const ref = createType === 'channel' ? database.ref('channels/' + data.id) : database.ref('groups/' + data.id);
            ref.set(data);
            
            document.getElementById('createModal').classList.add('hidden');
            alert(`✅ ${createType === 'channel' ? 'Канал' : 'Группа'} "${name}" создан!`);
        }
        
        // ========== ПАНЕЛЬ ВКЛАДОК ==========
        function initTabs() {
            const tabs = document.querySelectorAll('.panel-tab');
            const panels = {
                chats: document.getElementById('chatsPanel'),
                channels: document.getElementById('channelsPanel'),
                groups: document.getElementById('groupsPanel')
            };
            
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    Object.values(panels).forEach(p => p.classList.add('hidden'));
                    panels[tab.dataset.tab].classList.remove('hidden');
                });
            });
        }
        
        // ========== ОНЛАЙН СТАТУС ==========
        function updateOnlineStatus() {
            setInterval(() => {
                if (myId) database.ref('users/' + myId).update({ online: true, lastSeen: Date.now() });
            }, 10000);
            
            window.addEventListener('beforeunload', () => {
                if (myId) database.ref('users/' + myId).update({ online: false, lastSeen: Date.now() });
            });
        }
        
        function watchUserStatus() {
            database.ref('users').on('value', () => renderDialogs());
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function initMobileMenu() {
            const menuBtn = document.getElementById('menuBtn');
            const usersPanel = document.getElementById('usersPanel');
            if (menuBtn) {
                menuBtn.addEventListener('click', () => usersPanel.classList.toggle('open'));
            }
            document.addEventListener('click', (e) => {
                if (window.innerWidth <= 768 && e.target.closest('.dialog-item')) {
                    usersPanel.classList.remove('open');
                }
            });
        }
        
        function initApp() {
            loadUsers();
            loadChannels();
            loadGroups();
            updateOnlineStatus();
            watchUserStatus();
            initTabs();
            initMobileMenu();
            
            document.getElementById('sendBtn').addEventListener('click', sendMessage);
            document.getElementById('messageInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
            
            document.getElementById('createChannelBtn').addEventListener('click', () => showCreateModal('channel'));
            document.getElementById('createGroupBtn').addEventListener('click', () => showCreateModal('group'));
            document.getElementById('modalCreateBtn').addEventListener('click', createChannelOrGroup);
            document.getElementById('modalCancelBtn').addEventListener('click', () => {
                document.getElementById('createModal').classList.add('hidden');
            });
        }
        
        document.getElementById('registerBtn').addEventListener('click', register);
        document.getElementById('nicknameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') register();
        });
        
        checkExistingUser();
    </script>
</body>
</html>
