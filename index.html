<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniGram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui; background: #0f0f0f; color: white; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .register-box, .chat-box { background: #1a1a1a; padding: 30px; border-radius: 24px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 30px; border: none; background: #2a2a2a; color: white; font-size: 16px; }
        button { background: #667eea; color: white; border: none; padding: 12px 24px; border-radius: 30px; font-size: 16px; cursor: pointer; }
        .user-list { margin-top: 20px; }
        .user-item { background: #2a2a2a; padding: 15px; border-radius: 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .messages { height: 400px; overflow-y: auto; margin: 20px 0; padding: 10px; background: #1a1a1a; border-radius: 16px; }
        .message { padding: 8px 12px; margin: 5px; border-radius: 16px; max-width: 70%; }
        .my { background: #667eea; align-self: flex-end; margin-left: auto; }
        .other { background: #2a2a2a; }
        .input-area { display: flex; gap: 10px; margin-top: 10px; }
        .hidden { display: none; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
<div class="container">
    <!-- Регистрация -->
    <div id="registerPanel" class="register-box">
        <h2>✨ MiniGram</h2>
        <input type="text" id="nickname" placeholder="Твой никнейм">
        <button onclick="register()">Начать</button>
        <p id="errorMsg" style="color:#ff4757; margin-top:10px;"></p>
    </div>

    <!-- Чат -->
    <div id="chatPanel" class="chat-box hidden">
        <div id="usersList" class="user-list"></div>
        <div id="chatArea" class="hidden">
            <div id="chatHeader" style="margin-bottom: 10px;">
                <strong id="chatWith"></strong> <span id="onlineStatus"></span>
            </div>
            <div id="messages" class="messages"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Сообщение...">
                <button onclick="sendMessage()">📤</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== ВСТАВЬ СВОИ КЛЮЧИ СЮДА ==========
    const firebaseConfig = {
  apiKey: "AIzaSyD8UUafDtOr6mof098U0uW8yhRLIv76zZY",
  authDomain: "mim-b31d1.firebaseapp.com",
  projectId: "mim-b31d1",
  storageBucket: "mim-b31d1.firebasestorage.app",
  messagingSenderId: "1030925152892",
  appId: "1:1030925152892:web:1c248bf39186a7006d4ff9"
};

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myId = null;
    let myName = null;
    let currentChatWith = null;

    function register() {
        const name = document.getElementById('nickname').value.trim();
        if (!name) {
            document.getElementById('errorMsg').textContent = 'Введи никнейм!';
            return;
        }
        myId = Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        myName = name;

        db.ref('users/' + myId).set({
            id: myId,
            name: myName,
            online: true,
            lastSeen: Date.now()
        });

        localStorage.setItem('minigram_user', JSON.stringify({ id: myId, name: myName }));
        document.getElementById('registerPanel').classList.add('hidden');
        document.getElementById('chatPanel').classList.remove('hidden');
        loadUsers();
    }

    function checkUser() {
        const saved = localStorage.getItem('minigram_user');
        if (saved) {
            const user = JSON.parse(saved);
            myId = user.id;
            myName = user.name;
            db.ref('users/' + myId).update({ online: true, lastSeen: Date.now() });
            document.getElementById('registerPanel').classList.add('hidden');
            document.getElementById('chatPanel').classList.remove('hidden');
            loadUsers();
        }
    }

    function loadUsers() {
        db.ref('users').on('value', (snapshot) => {
            const users = snapshot.val() || {};
            const container = document.getElementById('usersList');
            const list = Object.values(users).filter(u => u.id !== myId);
            
            if (list.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#888;">👥 Нет других пользователей</p>';
                return;
            }
            
            container.innerHTML = list.map(user => `
                <div class="user-item" onclick="startChat('${user.id}', '${escapeHtml(user.name)}')">
                    <span style="font-size:30px;">${user.online ? '🟢' : '⚫'}</span>
                    <div><strong>${escapeHtml(user.name)}</strong><br><small>${user.online ? 'Онлайн' : 'Офлайн'}</small></div>
                </div>
            `).join('');
        });
    }

    function startChat(userId, userName) {
        currentChatWith = userId;
        document.getElementById('chatArea').classList.remove('hidden');
        document.getElementById('chatWith').innerHTML = userName;
        document.getElementById('messages').innerHTML = '';
        
        const chatId = [myId, userId].sort().join('_');
        const msgsRef = db.ref('messages/' + chatId);
        
        msgsRef.off();
        msgsRef.limitToLast(50).on('child_added', (snapshot) => {
            const msg = snapshot.val();
            displayMessage(msg);
        });
    }

    function displayMessage(msg) {
        const container = document.getElementById('messages');
        const isMy = msg.senderId === myId;
        const time = new Date(msg.timestamp).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
        
        const div = document.createElement('div');
        div.className = `message ${isMy ? 'my' : 'other'}`;
        div.innerHTML = `
            <div>${escapeHtml(msg.text)}</div>
            <small style="opacity:0.6;">${time}</small>
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !currentChatWith) return;
        
        const chatId = [myId, currentChatWith].sort().join('_');
        db.ref('messages/' + chatId).push({
            senderId: myId,
            senderName: myName,
            text: text,
            timestamp: Date.now()
        });
        input.value = '';
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Онлайн статус
    setInterval(() => {
        if (myId) db.ref('users/' + myId).update({ online: true, lastSeen: Date.now() });
    }, 10000);
    
    window.addEventListener('beforeunload', () => {
        if (myId) db.ref('users/' + myId).update({ online: false });
    });

    checkUser();
</script>
</body>
</html>
