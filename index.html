<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LPP Messenger — Общайся с друзьями</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #2a2a2a;
            --border-color: #2a2a2a;
            --accent-color: #667eea;
            --accent-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --success-color: #28a745;
            --lpp-color: #ff6b6b;
        }

        body.light {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f0f0;
            --border-color: #e0e0e0;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        @keyframes messageAppear {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .chat-container {
            display: flex;
            height: 100vh;
            background: var(--bg-primary);
        }

        /* Боковая панель */
        .users-panel {
            width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 28px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-text {
            font-size: 18px;
            font-weight: bold;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .lpp-badge {
            background: var(--lpp-color);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 20px;
            margin-left: 5px;
        }

        .profile-area {
            position: relative;
            cursor: pointer;
        }

        .profile-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: transform 0.2s;
        }

        .profile-avatar:hover {
            transform: scale(1.05);
        }

        .profile-menu {
            position: absolute;
            top: 55px;
            right: 0;
            width: 260px;
            background: var(--bg-secondary);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 100;
            display: none;
            border: 1px solid var(--border-color);
        }

        .profile-menu.show {
            display: block;
            animation: messageAppear 0.2s ease;
        }

        .profile-menu-header {
            padding: 20px;
            text-align: center;
            background: var(--accent-gradient);
            border-radius: 20px 20px 0 0;
        }

        .profile-menu-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: 0 auto 10px;
        }

        .profile-menu-name {
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        .profile-menu-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
            color: var(--text-primary);
        }

        .profile-menu-item:hover {
            background: var(--bg-tertiary);
        }

        /* Вкладки */
        .panel-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
        }

        .panel-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .panel-tab.active {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
        }

        .panel-content.hidden {
            display: none;
        }

        /* Каналы и группы */
        .channel-item, .group-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid var(--border-color);
        }

        .channel-item:hover, .group-item:hover {
            background: var(--bg-tertiary);
        }

        .channel-avatar, .group-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .channel-avatar {
            background: #ff6b6b;
        }

        .group-avatar {
            background: #28a745;
        }

        .channel-info, .group-info {
            flex: 1;
        }

        .channel-name, .group-name {
            color: var(--text-primary);
            font-weight: bold;
            font-size: 15px;
        }

        .channel-desc, .group-desc {
            color: var(--text-secondary);
            font-size: 11px;
            margin-top: 2px;
        }

        .official-badge {
            background: #ff6b6b;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 20px;
            margin-left: 8px;
        }

        /* Диалоги */
        .dialog-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid var(--border-color);
        }

        .dialog-item:hover, .dialog-item.active {
            background: var(--bg-tertiary);
        }

        .dialog-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .dialog-info {
            flex: 1;
        }

        .dialog-name {
            color: var(--text-primary);
            font-weight: bold;
            font-size: 15px;
        }

        .dialog-last-message {
            color: var(--text-secondary);
            font-size: 12px;
            margin-top: 4px;
        }

        /* Чат */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-secondary);
        }

        .chat-header-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-info h3 {
            color: var(--text-primary);
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .chat-header-info p {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            word-wrap: break-word;
            animation: messageAppear 0.2s ease;
        }

        .message.my {
            background: var(--accent-color);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.other {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.bot {
            background: var(--lpp-color);
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-sender {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.6;
            text-align: right;
        }

        .message-input-area {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            background: var(--bg-secondary);
        }

        .message-input-area input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 30px;
            border: none;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }

        .message-input-area button {
            padding: 12px 20px;
            border-radius: 30px;
            border: none;
            background: var(--accent-color);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .register-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .register-box {
            background: var(--bg-secondary);
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .register-box input {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 16px;
            margin: 20px 0;
            text-align: center;
        }

        .register-box button {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: var(--accent-gradient);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--success-color);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (max-width: 768px) {
            .users-panel {
                position: fixed;
                left: -320px;
                top: 0;
                height: 100%;
                z-index: 200;
                transition: left 0.3s;
            }
            .users-panel.open {
                left: 0;
            }
            .menu-btn {
                display: block;
                position: fixed;
                top: 20px;
                left: 20px;
                z-index: 300;
                background: var(--accent-color);
                border: none;
                color: white;
                font-size: 24px;
                padding: 10px 15px;
                border-radius: 30px;
                cursor: pointer;
            }
            .message {
                max-width: 85%;
            }
        }

        @media (min-width: 769px) {
            .menu-btn {
                display: none;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <button class="menu-btn" id="menuBtn">☰</button>

    <!-- Регистрация -->
    <div id="registerOverlay" class="register-overlay">
        <div class="register-box">
            <div class="logo-area" style="justify-content: center; margin-bottom: 20px;">
                <span class="logo-icon">💬</span>
                <span class="logo-text">LPP Messenger</span>
            </div>
            <h2>Добро пожаловать!</h2>
            <p>Твой личный мессенджер с каналами и ботом</p>
            <input type="text" id="nicknameInput" placeholder="Придумай никнейм" maxlength="20">
            <button id="registerBtn">🚀 Начать</button>
            <div id="registerError" style="color:#ff4757; font-size:12px; margin-top:10px;"></div>
        </div>
    </div>

    <!-- Основной интерфейс -->
    <div class="chat-container" id="chatContainer" style="display: none;">
        <div class="users-panel" id="usersPanel">
            <div class="panel-header">
                <div class="logo-area">
                    <span class="logo-icon">💬</span>
                    <span class="logo-text">LPP</span>
                </div>
                <div class="profile-area" id="profileArea">
                    <div class="profile-avatar" id="profileAvatar">😀</div>
                    <div class="profile-menu" id="profileMenu">
                        <div class="profile-menu-header">
                            <div class="profile-menu-avatar" id="menuAvatar">😀</div>
                            <div class="profile-menu-name" id="menuName">User</div>
                        </div>
                        <div class="profile-menu-item theme-switch" style="justify-content: space-between;">
                            <span>🎨 Тема</span>
                            <div style="display: flex; gap: 8px;">
                                <span class="theme-option" data-theme="dark">🌙 Тёмная</span>
                                <span class="theme-option" data-theme="light">☀️ Светлая</span>
                            </div>
                        </div>
                        <div class="profile-menu-item" id="logoutMenuItem">
                            <span>🚪 Выйти</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel-tabs">
                <button class="panel-tab active" data-tab="chats">💬 Чаты</button>
                <button class="panel-tab" data-tab="channels">📢 Каналы</button>
                <button class="panel-tab" data-tab="groups">👥 Группы</button>
            </div>

            <!-- Чаты -->
            <div id="chatsPanel" class="panel-content">
                <div id="dialogsList" style="padding: 20px; color: var(--text-secondary); text-align: center;">Загрузка...</div>
            </div>

            <!-- Каналы -->
            <div id="channelsPanel" class="panel-content hidden">
                <div id="channelsList"></div>
            </div>

            <!-- Группы -->
            <div id="groupsPanel" class="panel-content hidden">
                <div id="groupsList"></div>
            </div>
        </div>

        <!-- Чат -->
        <div class="chat-main">
            <div class="chat-header" id="chatHeader" style="display: none;">
                <div class="chat-header-avatar" id="chatAvatar">😀</div>
                <div class="chat-header-info">
                    <h3 id="chatUserName">Выберите чат</h3>
                    <p id="chatUserStatus"></p>
                </div>
            </div>

            <div class="messages-area" id="messagesArea">
                <div style="text-align: center; color: var(--text-secondary); padding: 40px;">👈 Выберите чат</div>
            </div>

            <div class="message-input-area" id="messageInputArea" style="display: none;">
                <input type="text" id="messageInput" placeholder="Напиши сообщение...">
                <button id="sendBtn">📤</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <script>
        // ========== FIREBASE КЛЮЧИ (ВСТАВЬ СВОИ) ==========
        const firebaseConfig = {
  apiKey: "AIzaSyD8UUafDtOr6mof098U0uW8yhRLIv76zZY",
  authDomain: "mim-b31d1.firebaseapp.com",
  databaseURL: "https://mim-b31d1-default-rtdb.firebaseio.com",
  projectId: "mim-b31d1",
  storageBucket: "mim-b31d1.firebasestorage.app",
  messagingSenderId: "1030925152892",
  appId: "1:1030925152892:web:1c248bf39186a7006d4ff9"
};
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        // ========== ПЕРЕМЕННЫЕ ==========
        let myId = null;
        let myName = null;
        let myAvatar = '😀';
        let currentChatId = null;
        let currentChatType = null;
        let currentChatName = null;
        let users = {};
        let currentMessagesRef = null;
        
        // LPP Бот
        const BOT_ID = "lpp_bot";
        const BOT_NAME = "LPP Бот";
        const BOT_AVATAR = "🤖";
        
        // Каналы и группы
        let channels = {
            "lpp_official": {
                id: "lpp_official",
                name: "LPP Official",
                description: "Официальный канал LPP Messenger",
                avatar: "📢",
                isOfficial: true
            },
            "lpp_news": {
                id: "lpp_news",
                name: "LPP Новости",
                description: "Новости проекта",
                avatar: "📰",
                isOfficial: true
            }
        };
        
        let groups = {
            "lpp_chat": {
                id: "lpp_chat",
                name: "LPP Общий чат",
                description: "Общайся с другими пользователями",
                avatar: "👥",
                members: {}
            }
        };
        
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        function initChannelsAndGroups() {
            // Сохраняем каналы в Firebase
            for (let id in channels) {
                database.ref('channels/' + id).set(channels[id]);
            }
            for (let id in groups) {
                database.ref('groups/' + id).set(groups[id]);
            }
        }
        
        // ========== РЕГИСТРАЦИЯ ==========
        function register() {
            const nickname = document.getElementById('nicknameInput').value.trim();
            if (!nickname || nickname.length < 2) {
                document.getElementById('registerError').textContent = '❌ Минимум 2 символа';
                return;
            }
            
            myId = Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            myName = nickname;
            myAvatar = ['😀', '😎', '🥳', '😺', '🦊', '🐼', '🌟'][Math.floor(Math.random() * 7)];
            
            database.ref('users/' + myId).set({
                id: myId, name: myName, avatar: myAvatar, online: true, lastSeen: Date.now()
            });
            localStorage.setItem('lpp_user', JSON.stringify({ id: myId, name: myName, avatar: myAvatar }));
            
            document.getElementById('registerOverlay').style.display = 'none';
            document.getElementById('chatContainer').style.display = 'flex';
            updateProfileUI();
            
            initChannelsAndGroups();
            loadData();
        }
        
        function checkUser() {
            const saved = localStorage.getItem('lpp_user');
            if (saved) {
                const user = JSON.parse(saved);
                myId = user.id;
                myName = user.name;
                myAvatar = user.avatar;
                database.ref('users/' + myId).update({ online: true, lastSeen: Date.now() });
                document.getElementById('registerOverlay').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'flex';
                updateProfileUI();
                loadData();
            }
        }
        
        function updateProfileUI() {
            document.getElementById('profileAvatar').textContent = myAvatar;
            document.getElementById('menuAvatar').textContent = myAvatar;
            document.getElementById('menuName').textContent = myName;
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // ========== ЗАГРУЗКА ДАННЫХ ==========
        function loadData() {
            loadUsers();
            loadChannels();
            loadGroups();
            initTabs();
            initMobileMenu();
            initTheme();
        }
        
        function loadUsers() {
            database.ref('users').on('value', (snapshot) => {
                users = snapshot.val() || {};
                renderDialogs();
            });
        }
        
        function loadChannels() {
            database.ref('channels').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                renderChannels(data);
            });
        }
        
        function loadGroups() {
            database.ref('groups').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                renderGroups(data);
            });
        }
        
        function renderDialogs() {
            const container = document.getElementById('dialogsList');
            const usersList = Object.values(users).filter(u => u.id !== myId);
            
            if (usersList.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-secondary);">👥 Нет других пользователей</div>';
                return;
            }
            
            container.innerHTML = usersList.map(user => `
                <div class="dialog-item" onclick="openChat('${user.id}', 'user', '${escapeHtml(user.name)}')">
                    <div class="dialog-avatar">${user.avatar || '😀'}</div>
                    <div class="dialog-info">
                        <div class="dialog-name">${escapeHtml(user.name)}</div>
                        <div class="dialog-last-message">${user.online ? '🟢 Онлайн' : '⚫ Офлайн'}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderChannels(channelsData) {
            const container = document.getElementById('channelsList');
            const channelsList = Object.values(channelsData);
            
            if (channelsList.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-secondary);">📢 Нет каналов</div>';
                return;
            }
            
            container.innerHTML = channelsList.map(channel => `
                <div class="channel-item" onclick="openChat('${channel.id}', 'channel', '${escapeHtml(channel.name)}')">
                    <div class="channel-avatar">${channel.avatar || '📢'}</div>
                    <div class="channel-info">
                        <div class="channel-name">${escapeHtml(channel.name)}${channel.isOfficial ? '<span class="official-badge">Официальный</span>' : ''}</div>
                        <div class="channel-desc">${escapeHtml(channel.description || 'Канал LPP')}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderGroups(groupsData) {
            const container = document.getElementById('groupsList');
            const groupsList = Object.values(groupsData);
            
            if (groupsList.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-secondary);">👥 Нет групп</div>';
                return;
            }
            
            container.innerHTML = groupsList.map(group => `
                <div class="group-item" onclick="openChat('${group.id}', 'group', '${escapeHtml(group.name)}')">
                    <div class="group-avatar">${group.avatar || '👥'}</div>
                    <div class="group-info">
                        <div class="group-name">${escapeHtml(group.name)}</div>
                        <div class="group-desc">${escapeHtml(group.description || 'Группа LPP')}</div>
                    </div>
                </div>
            `).join('');
        }
        
        // ========== ЧАТ ==========
        function openChat(id, type, name) {
            if (currentMessagesRef) currentMessagesRef.off();
            
            currentChatId = id;
            currentChatType = type;
            currentChatName = name;
            
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('messageInputArea').style.display = 'flex';
            document.getElementById('chatUserName').innerHTML = name;
            
            let avatar = '😀';
            if (type === 'user' && users[id]) avatar = users[id].avatar || '😀';
            else if (type === 'channel') avatar = '📢';
            else if (type === 'group') avatar = '👥';
            else if (id === BOT_ID) avatar = BOT_AVATAR;
            
            document.getElementById('chatAvatar').textContent = avatar;
            document.getElementById('chatUserStatus').innerHTML = type === 'user' && users[id] ? (users[id].online ? '🟢 Онлайн' : '⚫ Офлайн') : '';
            document.getElementById('messagesArea').innerHTML = '';
            
            loadMessages();
            
            // Скрываем панель на телефоне
            if (window.innerWidth <= 768) {
                document.getElementById('usersPanel').classList.remove('open');
            }
        }
        
        function getChatRef() {
            if (!currentChatId || !currentChatType) return null;
            
            if (currentChatType === 'user') {
                const chatId = [myId, currentChatId].sort().join('_');
                return database.ref('messages/private/' + chatId);
            } else if (currentChatType === 'channel') {
                return database.ref('messages/channels/' + currentChatId);
            } else if (currentChatType === 'group') {
                return database.ref('messages/groups/' + currentChatId);
            }
            return null;
        }
        
        function loadMessages() {
            const chatRef = getChatRef();
            if (!chatRef) return;
            currentMessagesRef = chatRef;
            
            chatRef.limitToLast(50).once('value', (snapshot) => {
                const messages = snapshot.val();
                if (messages) Object.values(messages).forEach(m => displayMessage(m));
            });
            
            chatRef.on('child_added', (snapshot) => {
                const msg = snapshot.val();
                if (!document.querySelector(`[data-msg-id="${msg.id}"]`)) {
                    displayMessage(msg);
                    if (msg.senderId !== myId && currentChatType !== 'channel') {
                        showToast(`📩 Новое сообщение от ${msg.senderName || 'LPP Бот'}`);
                    }
                }
            });
        }
        
        function displayMessage(message) {
            const container = document.getElementById('messagesArea');
            const isMy = message.senderId === myId;
            const isBot = message.senderId === BOT_ID;
            const date = new Date(message.timestamp);
            const timeStr = `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
            
            if (container.children.length === 1 && container.children[0].innerText.includes('Выберите чат')) {
                container.innerHTML = '';
            }
            
            const div = document.createElement('div');
            div.className = `message ${isMy ? 'my' : (isBot ? 'bot' : 'other')}`;
            div.setAttribute('data-msg-id', message.id);
            
            let senderHtml = '';
            if (!isMy && message.senderName) {
                senderHtml = `<div class="message-sender">${escapeHtml(message.senderName)}</div>`;
            }
            
            div.innerHTML = `
                ${senderHtml}
                ${escapeHtml(message.text)}
                <div class="message-time">${timeStr}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentChatId) return;
            
            const message = {
                id: Date.now() + '_' + Math.random(),
                senderId: myId,
                senderName: myName,
                text: text,
                timestamp: Date.now()
            };
            
            const chatRef = getChatRef();
            chatRef.push(message);
            input.value = '';
            
            // Ответ бота в канале LPP Official
            if (currentChatId === 'lpp_official' && currentChatType === 'channel') {
                setTimeout(() => {
                    const botReply = {
                        id: Date.now() + '_bot_' + Math.random(),
                        senderId: BOT_ID,
                        senderName: BOT_NAME,
                        text: getBotReply(text),
                        timestamp: Date.now()
                    };
                    chatRef.push(botReply);
                }, 1000);
            }
        }
        
        function getBotReply(question) {
            const q = question.toLowerCase();
            if (q.includes('привет') || q.includes('здравствуй')) {
                return `🤖 Привет, ${myName}! Рад тебя видеть в LPP Messenger! Чем могу помочь?`;
            } else if (q.includes('как дела')) {
                return `🤖 Всё отлично! А у тебя как?`;
            } else if (q.includes('помощь') || q.includes('help')) {
                return `🤖 Вот что я умею:\n• Отвечать на вопросы\n• Рассказывать о LPP\n• Помогать с настройками\n\nНапиши "о нас" или "команды" чтобы узнать больше!`;
            } else if (q.includes('о нас') || q.includes('о lpp')) {
                return `🤖 LPP Messenger — это современный мессенджер с каналами, группами и официальным ботом. Мы создаём удобное пространство для общения!`;
            } else if (q.includes('команды')) {
                return `🤖 Доступные команды:\n• привет - поздороваться\n• помощь - список команд\n• о нас - информация о проекте\n• вопрос [текст] - задать вопрос разработчикам`;
            } else if (q.includes('вопрос')) {
                return `🤖 Твой вопрос отправлен разработчикам! Мы ответим в ближайшее время.`;
            } else {
                return `🤖 Спасибо за сообщение! Я передам его разработчикам. Если хочешь узнать команды, напиши "помощь".`;
            }
        }
        
        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        function initTabs() {
            const tabs = document.querySelectorAll('.panel-tab');
            const panels = {
                chats: document.getElementById('chatsPanel'),
                channels: document.getElementById('channelsPanel'),
                groups: document.getElementById('groupsPanel')
            };
            
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    Object.values(panels).forEach(p => p.classList.add('hidden'));
                    panels[tab.dataset.tab].classList.remove('hidden');
                });
            });
        }
        
        function initTheme() {
            const saved = localStorage.getItem('lpp_theme') || 'dark';
            document.body.classList.add(saved);
            document.querySelectorAll('.theme-option').forEach(opt => {
                opt.classList.toggle('active', opt.dataset.theme === saved);
            });
        }
        
        function setTheme(theme) {
            document.body.classList.remove('dark', 'light');
            document.body.classList.add(theme);
            localStorage.setItem('lpp_theme', theme);
            document.querySelectorAll('.theme-option').forEach(opt => {
                opt.classList.toggle('active', opt.dataset.theme === theme);
            });
        }
        
        function toggleProfileMenu() {
            document.getElementById('profileMenu').classList.toggle('show');
        }
        
        function logout() {
            if (confirm('Выйти?')) {
                database.ref('users/' + myId).update({ online: false });
                localStorage.removeItem('lpp_user');
                location.reload();
            }
        }
        
        function initMobileMenu() {
            const menuBtn = document.getElementById('menuBtn');
            const panel = document.getElementById('usersPanel');
            if (menuBtn) {
                menuBtn.addEventListener('click', () => panel.classList.toggle('open'));
            }
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.profile-area')) {
                    document.getElementById('profileMenu').classList.remove('show');
                }
            });
        }
        
        function updateOnlineStatus() {
            setInterval(() => {
                if (myId) database.ref('users/' + myId).update({ online: true, lastSeen: Date.now() });
            }, 10000);
            window.addEventListener('beforeunload', () => {
                if (myId) database.ref('users/' + myId).update({ online: false });
            });
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ========== ЗАПУСК ==========
        document.getElementById('registerBtn').onclick = register;
        document.getElementById('nicknameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') register();
        });
        
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        document.getElementById('profileArea').onclick = toggleProfileMenu;
        document.getElementById('logoutMenuItem').onclick = logout;
        
        document.querySelectorAll('.theme-option').forEach(opt => {
            opt.addEventListener('click', (e) => {
                e.stopPropagation();
                setTheme(opt.dataset.theme);
            });
        });
        
        updateOnlineStatus();
        checkUser();
    </script>
</body>
</html>
