<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LPP Messenger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .register-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-box {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 30px;
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        .register-box input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border-radius: 30px;
            border: none;
            background: #2a2a2a;
            color: white;
            font-size: 16px;
            text-align: center;
        }

        .register-box button {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: #667eea;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .error {
            color: #ff4757;
            font-size: 12px;
            margin-top: 10px;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
        }

        .online-badge {
            background: #28a745;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .profile-btn {
            background: #2a2a2a;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .user-card {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .user-card:hover {
            background: #2a2a2a;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .user-name {
            font-weight: bold;
        }

        .user-status {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: white;
        }

        .chat-title {
            flex: 1;
            font-weight: bold;
            font-size: 18px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            word-wrap: break-word;
        }

        .message.my {
            background: #667eea;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.other {
            background: #2a2a2a;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            background: #1a1a1a;
            border-top: 1px solid #2a2a2a;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 30px;
            border: none;
            background: #2a2a2a;
            color: white;
            outline: none;
        }

        .input-area button {
            padding: 12px 20px;
            border-radius: 30px;
            border: none;
            background: #667eea;
            color: white;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.hidden {
            display: none;
        }

        .modal-content {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 30px;
            width: 280px;
            text-align: center;
        }

        .modal-content button {
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 30px;
            border: none;
            background: #ff4757;
            color: white;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="header">💬 LPP Messenger</div>

    <!-- Регистрация -->
    <div id="registerScreen" class="register-container">
        <div class="register-box">
            <h2>Добро пожаловать!</h2>
            <input type="text" id="nickname" placeholder="Твой никнейм" maxlength="20">
            <button id="registerBtn">Начать общение</button>
            <div id="regError" class="error"></div>
        </div>
    </div>

    <!-- Основной экран -->
    <div id="mainScreen" class="main-container hidden">
        <div class="top-bar">
            <div></div>
            <div class="online-badge" id="onlineCount">0 онлайн</div>
            <div class="profile-btn" id="profileBtn">👤</div>
        </div>
        <div id="usersList" class="users-list">
            <div style="text-align: center; padding: 40px; color: #888;">Загрузка...</div>
        </div>
    </div>

    <!-- Экран чата -->
    <div id="chatScreen" class="chat-container hidden">
        <div class="chat-header">
            <button class="back-btn" id="backBtn">←</button>
            <div class="chat-title" id="chatTitle"></div>
            <div style="width: 40px;"></div>
        </div>
        <div id="messagesList" class="messages"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Сообщение...">
            <button id="sendMsgBtn">📤</button>
        </div>
    </div>

    <!-- Модалка профиля -->
    <div id="profileModal" class="modal hidden">
        <div class="modal-content">
            <div id="modalName" style="font-size: 20px; margin-bottom: 10px;"></div>
            <button id="logoutBtn">Выйти</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // ========== ВСТАВЬ СВОИ КЛЮЧИ FIREBASE ==========
        const firebaseConfig = {
            apiKey: "AIzaSyD8UUafDtOr6mof098U0uW8yhRLIv76zZY",
            authDomain: "mim-b31d1.firebaseapp.com",
            databaseURL: "https://mim-b31d1-default-rtdb.firebaseio.com",
            projectId: "mim-b31d1",
            storageBucket: "mim-b31d1.firebasestorage.app",
            messagingSenderId: "1030925152892",
            appId: "1:1030925152892:web:1c248bf39186a7006d4ff9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ========== ПЕРЕМЕННЫЕ ==========
        let myId = null;
        let myName = null;
        let currentChatId = null;
        let currentChatName = null;
        let currentMessagesRef = null;     // ссылка на слушатель сообщений
        let currentChatListener = null;    // функция-слушатель, чтобы отключать

        // ========== ВСПОМОГАТЕЛЬНЫЕ ==========
        function showScreen(screenId) {
            document.getElementById('registerScreen').classList.add('hidden');
            document.getElementById('mainScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
        }

        function showToast(msg) {
            alert(msg);  // можно заменить на красивое уведомление
        }

        // ========== РЕГИСТРАЦИЯ ==========
        function register() {
            const nickname = document.getElementById('nickname').value.trim();
            if (nickname.length < 2) {
                document.getElementById('regError').innerText = 'Никнейм должен быть минимум 2 символа';
                return;
            }
            myId = Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            myName = nickname;

            const userData = {
                id: myId,
                name: myName,
                online: true,
                lastSeen: Date.now()
            };

            db.ref('users/' + myId).set(userData)
                .then(() => {
                    localStorage.setItem('lpp_user', JSON.stringify({ id: myId, name: myName }));
                    showScreen('mainScreen');
                    loadUsers();
                    startOnlinePing();
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('regError').innerText = 'Ошибка: ' + err.message;
                });
        }

        // ========== ЗАГРУЗКА СПИСКА ПОЛЬЗОВАТЕЛЕЙ ==========
        function loadUsers() {
            db.ref('users').on('value', (snapshot) => {
                const users = snapshot.val() || {};
                renderUsersList(users);
                updateOnlineCount(users);
            }, (error) => {
                console.error('Ошибка загрузки пользователей:', error);
                document.getElementById('usersList').innerHTML = '<div style="text-align:center;padding:40px;color:#888;">Ошибка загрузки. Проверьте правила Firebase.</div>';
            });
        }

        // ПОЛУЧАЕМ ИМЯ ПОЛЬЗОВАТЕЛЯ (из разных полей)
        function getUserName(user) {
            if (user.name) return user.name;
            if (user.nickname) return user.nickname;
            return 'Без имени';
        }

        function renderUsersList(users) {
            const container = document.getElementById('usersList');
            const list = Object.values(users).filter(u => u.id !== myId);
            if (list.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#888;">👥 Нет других пользователей<br><small>Поделись ссылкой с другом</small></div>';
                return;
            }
            container.innerHTML = list.map(user => {
                const displayName = getUserName(user);
                return `
                    <div class="user-card" onclick="openChat('${user.id}', '${escapeHtml(displayName)}')">
                        <div class="user-avatar">${user.online ? '🟢' : '⚫'}</div>
                        <div>
                            <div class="user-name">${escapeHtml(displayName)}</div>
                            <div class="user-status">${user.online ? 'Онлайн' : 'Офлайн'}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateOnlineCount(users) {
            const online = Object.values(users).filter(u => u.online === true && u.id !== myId).length;
            document.getElementById('onlineCount').innerText = online + ' онлайн';
        }

        // ========== ЧАТ ==========
        function openChat(userId, userName) {
            // Отключаем старый слушатель, если был
            if (currentMessagesRef && currentChatListener) {
                currentMessagesRef.off('child_added', currentChatListener);
            }

            currentChatId = userId;
            currentChatName = userName;
            document.getElementById('chatTitle').innerText = userName;
            // Очищаем сообщения
            document.getElementById('messagesList').innerHTML = '';
            showScreen('chatScreen');

            const chatRef = getChatRef();
            currentMessagesRef = chatRef;

            // Загружаем историю (один раз)
            chatRef.limitToLast(50).once('value', (snapshot) => {
                const messages = snapshot.val();
                if (messages) {
                    const msgsArray = Object.values(messages);
                    msgsArray.forEach(msg => displayMessage(msg));
                }
            });

            // Слушаем новые сообщения (сохраняем функцию, чтобы потом отключить)
            const newMsgListener = (snapshot) => {
                const msg = snapshot.val();
                // Проверяем, не добавлено ли уже это сообщение (по id)
                if (!document.querySelector(`[data-msg-id="${msg.id}"]`)) {
                    displayMessage(msg);
                }
            };
            currentChatListener = newMsgListener;
            chatRef.on('child_added', newMsgListener);
        }

        function getChatRef() {
            if (!currentChatId) return null;
            const chatId = [myId, currentChatId].sort().join('_');
            return db.ref('messages/' + chatId);
        }

        function displayMessage(msg) {
            const container = document.getElementById('messagesList');
            const isMy = msg.senderId === myId;
            const date = new Date(msg.timestamp);
            const time = `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
            const div = document.createElement('div');
            div.className = `message ${isMy ? 'my' : 'other'}`;
            div.setAttribute('data-msg-id', msg.id);
            div.innerHTML = `
                ${escapeHtml(msg.text)}
                <div class="message-time">${time}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentChatId) return;

            const msg = {
                id: Date.now() + '_' + Math.random(),
                senderId: myId,
                senderName: myName,
                text: text,
                timestamp: Date.now()
            };
            getChatRef().push(msg);
            input.value = '';
        }

        // ========== ПРОФИЛЬ И ВЫХОД ==========
        function showProfile() {
            document.getElementById('modalName').innerText = myName;
            document.getElementById('profileModal').classList.remove('hidden');
        }

        function logout() {
            if (confirm('Выйти?')) {
                db.ref('users/' + myId).update({ online: false });
                localStorage.removeItem('lpp_user');
                location.reload();
            }
        }

        // ========== ОНЛАЙН СТАТУС ==========
        function startOnlinePing() {
            setInterval(() => {
                if (myId) {
                    db.ref('users/' + myId).update({ online: true, lastSeen: Date.now() });
                }
            }, 15000);

            window.addEventListener('beforeunload', () => {
                if (myId) db.ref('users/' + myId).update({ online: false });
            });
        }

        // ========== НАВИГАЦИЯ ==========
        function backToMain() {
            // Отключаем слушатель сообщений
            if (currentMessagesRef && currentChatListener) {
                currentMessagesRef.off('child_added', currentChatListener);
                currentMessagesRef = null;
                currentChatListener = null;
            }
            currentChatId = null;
            showScreen('mainScreen');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ========== ПРОВЕРКА СОХРАНЁННОГО ПОЛЬЗОВАТЕЛЯ ==========
        function checkSavedUser() {
            const saved = localStorage.getItem('lpp_user');
            if (saved) {
                const user = JSON.parse(saved);
                myId = user.id;
                myName = user.name;
                db.ref('users/' + myId).update({ online: true, lastSeen: Date.now() });
                showScreen('mainScreen');
                loadUsers();
                startOnlinePing();
            } else {
                showScreen('registerScreen');
            }
        }

        // ========== ПОДКЛЮЧАЕМ КНОПКИ ==========
        document.getElementById('registerBtn').onclick = register;
        document.getElementById('nickname').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') register();
        });
        document.getElementById('sendMsgBtn').onclick = sendMessage;
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        document.getElementById('backBtn').onclick = backToMain;
        document.getElementById('profileBtn').onclick = showProfile;
        document.getElementById('logoutBtn').onclick = logout;
        document.getElementById('profileModal').onclick = (e) => {
            if (e.target === document.getElementById('profileModal')) {
                document.getElementById('profileModal').classList.add('hidden');
            }
        };

        // СТАРТ
        checkSavedUser();
    </script>
</body>
</html>
