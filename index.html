<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23667eea'/%3E%3Ctext x='50' y='68' font-size='50' text-anchor='middle' fill='white' font-family='Arial'%3E📢%3C/text%3E%3C/svg%3E">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MiniGram — твой мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            min-height: 100vh;
        }

        .chat-container {
            display: flex;
            height: 100vh;
            background: #0f0f0f;
        }

        .users-panel {
            width: 300px;
            background: #1a1a1a;
            border-right: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
        }

        .user-info {
            padding: 20px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
        }

        .user-details h3 {
            color: white;
            font-size: 16px;
        }

        .user-details p {
            color: #888;
            font-size: 12px;
        }

        .online-status {
            color: #28a745;
            font-size: 10px;
            margin-top: 4px;
        }

        .panel-tabs {
            display: flex;
            border-bottom: 1px solid #2a2a2a;
        }

        .panel-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .panel-tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }

        .panel-tab.disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
        }

        .panel-content.hidden {
            display: none;
        }

        /* Заглушка "В разработке" */
        .coming-soon {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 300px;
            text-align: center;
            padding: 40px;
        }

        .coming-soon-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .coming-soon h3 {
            color: white;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .coming-soon p {
            color: #888;
            font-size: 14px;
        }

        .coming-soon small {
            color: #666;
            font-size: 12px;
            margin-top: 20px;
        }

        .dialog-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #2a2a2a;
        }

        .dialog-item:hover {
            background: #2a2a2a;
        }

        .dialog-item.active {
            background: #2a2a2a;
            border-left: 3px solid #667eea;
        }

        .dialog-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
        }

        .dialog-info {
            flex: 1;
        }

        .dialog-name {
            color: white;
            font-weight: bold;
            font-size: 15px;
        }

        .dialog-type {
            font-size: 10px;
            color: #888;
            margin-top: 2px;
        }

        .dialog-last-message {
            color: #888;
            font-size: 12px;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f0f0f;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1a1a1a;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .chat-header-info h3 {
            color: white;
            font-size: 16px;
        }

        .chat-header-info p {
            color: #888;
            font-size: 12px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Анимация появления сообщений */
        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            word-wrap: break-word;
            animation: messageAppear 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform-origin: left;
        }

        @keyframes messageAppear {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(20px);
            }
            50% {
                transform: scale(1.02);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* Свои сообщения анимируются справа */
        .message.my-message {
            background: #667eea;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            animation: messageAppearMy 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes messageAppearMy {
            0% {
                opacity: 0;
                transform: scale(0.8) translateX(20px);
            }
            50% {
                transform: scale(1.02);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateX(0);
            }
        }

        .message.other-message {
            background: #2a2a2a;
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-sender {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.6;
            text-align: right;
        }

        .message-input-area {
            padding: 20px;
            border-top: 1px solid #2a2a2a;
            display: flex;
            gap: 12px;
            background: #1a1a1a;
        }

        .message-input-area input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 30px;
            border: none;
            background: #2a2a2a;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .message-input-area input::placeholder {
            color: #888;
        }

        .message-input-area button {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .message-input-area button:active {
            transform: scale(0.95);
        }

        .register-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .register-box {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .register-box h2 {
            color: white;
            margin-bottom: 10px;
        }

        .register-box p {
            color: #888;
            margin-bottom: 30px;
        }

        .register-box input {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: #2a2a2a;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .register-box button {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Адаптив */
        @media (max-width: 768px) {
            .users-panel {
                position: fixed;
                left: -300px;
                top: 0;
                height: 100%;
                z-index: 200;
                transition: left 0.3s;
            }
            .users-panel.open {
                left: 0;
            }
            .menu-btn {
                display: block;
                position: fixed;
                top: 20px;
                left: 20px;
                z-index: 300;
                background: #667eea;
                border: none;
                color: white;
                font-size: 24px;
                padding: 10px 15px;
                border-radius: 30px;
                cursor: pointer;
            }
            .message {
                max-width: 85%;
            }
        }

        @media (min-width: 769px) {
            .menu-btn {
                display: none;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="registerOverlay" class="register-overlay">
        <div class="register-box">
            <h2>✨ MiniGram</h2>
            <p>Твой личный мессенджер</p>
            <input type="text" id="nicknameInput" placeholder="Придумай никнейм" maxlength="20">
            <button id="registerBtn">🚀 Начать общение</button>
            <div id="registerError" style="color:#ff4757; font-size:12px; margin-top:10px;"></div>
        </div>
    </div>

    <div class="chat-container" style="display: none;" id="chatContainer">
        <button class="menu-btn" id="menuBtn">☰</button>

        <div class="users-panel" id="usersPanel">
            <div class="user-info">
                <div class="user-avatar" id="myAvatar">😀</div>
                <div class="user-details">
                    <h3 id="myNickname">Загрузка...</h3>
                    <div class="online-status">🟢 Онлайн</div>
                </div>
            </div>

            <div class="panel-tabs">
                <button class="panel-tab active" data-tab="chats">💬 Чаты</button>
                <button class="panel-tab disabled" data-tab="channels" disabled>📢 Каналы</button>
                <button class="panel-tab disabled" data-tab="groups" disabled>👥 Группы</button>
            </div>

            <!-- Чаты (работают) -->
            <div id="chatsPanel" class="panel-content">
                <div class="dialogs-list" id="dialogsList">
                    <div style="padding: 20px; color: #888; text-align: center;">Загрузка...</div>
                </div>
            </div>

            <!-- Каналы (в разработке) -->
            <div id="channelsPanel" class="panel-content hidden">
                <div class="coming-soon">
                    <div class="coming-soon-icon">📢</div>
                    <h3>Скоро появится!</h3>
                    <p>Каналы находятся в разработке</p>
                    <small>Подписывайся на новости в Telegram</small>
                </div>
            </div>

            <!-- Группы (в разработке) -->
            <div id="groupsPanel" class="panel-content hidden">
                <div class="coming-soon">
                    <div class="coming-soon-icon">👥</div>
                    <h3>Скоро появится!</h3>
                    <p>Группы находятся в разработке</p>
                    <small>Создавай чаты с друзьями позже</small>
                </div>
            </div>
        </div>

        <div class="chat-main">
            <div class="chat-header" id="chatHeader" style="display: none;">
                <div class="chat-header-avatar" id="chatAvatar">😀</div>
                <div class="chat-header-info">
                    <h3 id="chatUserName">Выберите чат</h3>
                    <p id="chatUserStatus"></p>
                </div>
            </div>

            <div class="messages-area" id="messagesArea">
                <div style="text-align: center; color: #888; padding: 40px;">
                    👈 Выберите чат из списка
                </div>
            </div>

            <div class="message-input-area" style="display: none;" id="messageInputArea">
                <input type="text" id="messageInput" placeholder="Напиши сообщение..." maxlength="500">
                <button id="sendBtn">📤 Отправить</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <script>
        // ========== FIREBASE КЛЮЧИ (ВСТАВЬ СВОИ) ==========
        const firebaseConfig = {
  apiKey: "AIzaSyCKod1JVM2fp6kbCHfYdbAFJgTOHg8Kzfk",
  authDomain: "sitemaker-c4226.firebaseapp.com",
  projectId: "sitemaker-c4226",
  storageBucket: "sitemaker-c4226.firebasestorage.app",
  messagingSenderId: "1044402198283",
  appId: "1:1044402198283:web:504fd7e7a4199eb8de340e"
};
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        // ========== ПЕРЕМЕННЫЕ ==========
        let myId = null;
        let myNickname = null;
        let currentChatId = null;
        let currentChatType = null;
        let users = {};
        let currentMessagesRef = null;
        
        const avatars = ['😀', '😎', '🥳', '😺', '🦊', '🐼', '🌟', '🎮', '⚽', '🎵', '📚', '🎨'];
        
        function getRandomAvatar() {
            return avatars[Math.floor(Math.random() * avatars.length)];
        }
        
        // ========== РЕГИСТРАЦИЯ ==========
        function register() {
            const nickname = document.getElementById('nicknameInput').value.trim();
            const errorDiv = document.getElementById('registerError');
            
            if (!nickname || nickname.length < 2) {
                errorDiv.textContent = '❌ Введи никнейм (минимум 2 символа)';
                return;
            }
            
            myId = Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            myNickname = nickname;
            
            const userData = {
                id: myId,
                nickname: myNickname,
                avatar: getRandomAvatar(),
                online: true,
                lastSeen: Date.now()
            };
            
            database.ref('users/' + myId).set(userData);
            localStorage.setItem('minigram_user', JSON.stringify({ id: myId, nickname: myNickname }));
            
            document.getElementById('registerOverlay').style.display = 'none';
            document.getElementById('chatContainer').style.display = 'flex';
            document.getElementById('myNickname').textContent = myNickname;
            document.getElementById('myAvatar').textContent = userData.avatar;
            
            initApp();
        }
        
        function checkExistingUser() {
            const saved = localStorage.getItem('minigram_user');
            if (saved) {
                const user = JSON.parse(saved);
                myId = user.id;
                myNickname = user.nickname;
                database.ref('users/' + myId).update({ online: true, lastSeen: Date.now() });
                document.getElementById('registerOverlay').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'flex';
                document.getElementById('myNickname').textContent = myNickname;
                initApp();
            }
        }
        
        // ========== ЗАГРУЗКА ПОЛЬЗОВАТЕЛЕЙ ==========
        function loadUsers() {
            database.ref('users').on('value', (snapshot) => {
                users = snapshot.val() || {};
                renderDialogs();
            });
        }
        
        function renderDialogs() {
            const container = document.getElementById('dialogsList');
            if (!container) return;
            
            const usersList = Object.values(users).filter(u => u.id !== myId);
            
            if (usersList.length === 0) {
                container.innerHTML = '<div style="padding: 20px; color: #888; text-align: center;">👥 Нет других пользователей<br><small>Поделись ссылкой с друзьями!</small></div>';
                return;
            }
            
            container.innerHTML = usersList.map(user => `
                <div class="dialog-item ${currentChatId === user.id && currentChatType === 'user' ? 'active' : ''}" onclick="selectChat('${user.id}', 'user')">
                    <div class="dialog-avatar">${user.avatar || '😀'}</div>
                    <div class="dialog-info">
                        <div class="dialog-name">${escapeHtml(user.nickname)}</div>
                        <div class="dialog-type">💬 Личный чат</div>
                        <div class="dialog-last-message">${user.online ? '🟢 Онлайн' : '⚫ Офлайн'}</div>
                    </div>
                </div>
            `).join('');
        }
        
        // ========== ВЫБОР ЧАТА ==========
        window.selectChat = function(id, type) {
            if (currentMessagesRef) {
                currentMessagesRef.off();
            }
            
            currentChatId = id;
            currentChatType = type;
            
            renderDialogs();
            
            const selectedUser = users[id];
            if (selectedUser) {
                document.getElementById('chatHeader').style.display = 'flex';
                document.getElementById('messageInputArea').style.display = 'flex';
                document.getElementById('chatUserName').textContent = selectedUser.nickname;
                document.getElementById('chatAvatar').textContent = selectedUser.avatar || '😀';
                document.getElementById('chatUserStatus').innerHTML = selectedUser.online ? '🟢 Онлайн' : '⚫ Офлайн';
            }
            
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.innerHTML = '';
            
            loadMessages();
        };
        
        // ========== СООБЩЕНИЯ ==========
        function getChatRef() {
            if (!currentChatId || !currentChatType) return null;
            const chatId = [myId, currentChatId].sort().join('_');
            return database.ref('messages/' + chatId);
        }
        
        function loadMessages() {
            const chatRef = getChatRef();
            if (!chatRef) return;
            
            currentMessagesRef = chatRef;
            
            chatRef.limitToLast(50).once('value', (snapshot) => {
                const messages = snapshot.val();
                if (messages) {
                    const messagesArray = Object.values(messages);
                    messagesArray.forEach(message => {
                        displayMessage(message);
                    });
                }
            });
            
            chatRef.on('child_added', (snapshot) => {
                const message = snapshot.val();
                const existingMsg = document.querySelector(`[data-msg-id="${message.id}"]`);
                if (!existingMsg) {
                    displayMessage(message);
                }
            });
        }
        
        function displayMessage(message) {
            const container = document.getElementById('messagesArea');
            if (!container) return;
            
            const isMyMessage = message.senderId === myId;
            const date = new Date(message.timestamp);
            const timeStr = `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
            
            if (container.children.length === 1 && container.children[0].innerText.includes('Выберите чат')) {
                container.innerHTML = '';
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isMyMessage ? 'my-message' : 'other-message'}`;
            messageDiv.setAttribute('data-msg-id', message.id);
            messageDiv.innerHTML = `
                ${!isMyMessage ? `<div class="message-sender">${escapeHtml(message.senderNickname)}</div>` : ''}
                ${escapeHtml(message.text)}
                <div class="message-time">${timeStr}</div>
            `;
            container.appendChild(messageDiv);
            
            // Плавная прокрутка к новому сообщению
            setTimeout(() => {
                messageDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 50);
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentChatId || !currentChatType) return;
            
            const message = {
                id: Date.now() + '_' + Math.random(),
                senderId: myId,
                senderNickname: myNickname,
                text: text,
                timestamp: Date.now()
            };
            
            const chatRef = getChatRef();
            if (chatRef) {
                chatRef.push(message);
                input.value = '';
            }
        }
        
        // ========== ПАНЕЛЬ ВКЛАДОК ==========
        function initTabs() {
            const tabs = document.querySelectorAll('.panel-tab');
            const panels = {
                chats: document.getElementById('chatsPanel'),
                channels: document.getElementById('channelsPanel'),
                groups: document.getElementById('groupsPanel')
            };
            
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    // Если вкладка disabled — показываем заглушку
                    if (tab.classList.contains('disabled')) {
                        // Показываем всплывающее сообщение
                        const msg = document.createElement('div');
                        msg.textContent = '🔧 В разработке! Скоро появится';
                        msg.style.position = 'fixed';
                        msg.style.bottom = '100px';
                        msg.style.left = '50%';
                        msg.style.transform = 'translateX(-50%)';
                        msg.style.background = '#667eea';
                        msg.style.color = 'white';
                        msg.style.padding = '10px 20px';
                        msg.style.borderRadius = '30px';
                        msg.style.zIndex = '1000';
                        msg.style.fontSize = '14px';
                        document.body.appendChild(msg);
                        setTimeout(() => msg.remove(), 2000);
                        return;
                    }
                    
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    Object.values(panels).forEach(p => p.classList.add('hidden'));
                    panels[tab.dataset.tab].classList.remove('hidden');
                });
            });
        }
        
        // ========== ОНЛАЙН СТАТУС ==========
        function updateOnlineStatus() {
            setInterval(() => {
                if (myId) database.ref('users/' + myId).update({ online: true, lastSeen: Date.now() });
            }, 10000);
            
            window.addEventListener('beforeunload', () => {
                if (myId) database.ref('users/' + myId).update({ online: false, lastSeen: Date.now() });
            });
        }
        
        function watchUserStatus() {
            database.ref('users').on('value', () => {
                renderDialogs();
                if (currentChatId && users[currentChatId]) {
                    document.getElementById('chatUserStatus').innerHTML = users[currentChatId].online ? '🟢 Онлайн' : '⚫ Офлайн';
                }
            });
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function initMobileMenu() {
            const menuBtn = document.getElementById('menuBtn');
            const usersPanel = document.getElementById('usersPanel');
            if (menuBtn) {
                menuBtn.addEventListener('click', () => usersPanel.classList.toggle('open'));
            }
            document.addEventListener('click', (e) => {
                if (window.innerWidth <= 768 && e.target.closest('.dialog-item')) {
                    usersPanel.classList.remove('open');
                }
            });
        }
        
        function initApp() {
            loadUsers();
            updateOnlineStatus();
            watchUserStatus();
            initTabs();
            initMobileMenu();
            
            document.getElementById('sendBtn').addEventListener('click', sendMessage);
            document.getElementById('messageInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
        }
        
        document.getElementById('registerBtn').addEventListener('click', register);
        document.getElementById('nicknameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') register();
        });
        
        checkExistingUser();
    </script>
</body>
</html>
