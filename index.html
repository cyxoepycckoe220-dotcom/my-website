<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MiniGram — мессенджер с картинками и голосом</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #2a2a2a;
            --border-color: #2a2a2a;
            --accent-color: #667eea;
            --accent-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --success-color: #28a745;
            --danger-color: #ff4757;
        }

        body.light {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f0f0;
            --border-color: #e0e0e0;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        /* Анимации */
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        @keyframes messageAppear {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            50% { transform: scale(1.02); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes messageAppearMy {
            0% { opacity: 0; transform: scale(0.8) translateX(20px); }
            50% { transform: scale(1.02); }
            100% { opacity: 1; transform: scale(1) translateX(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .chat-container {
            display: flex;
            height: 100vh;
            background: var(--bg-primary);
        }

        /* Боковая панель */
        .users-panel {
            width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            animation: logoFloat 3s ease infinite;
        }

        .logo-icon {
            font-size: 32px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-text {
            font-size: 20px;
            font-weight: bold;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .profile-area {
            position: relative;
            cursor: pointer;
        }

        .profile-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transition: transform 0.2s;
        }

        .profile-avatar:hover {
            transform: scale(1.05);
        }

        .profile-menu {
            position: absolute;
            top: 55px;
            right: 0;
            width: 280px;
            background: var(--bg-secondary);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 100;
            display: none;
            border: 1px solid var(--border-color);
        }

        .profile-menu.show {
            display: block;
            animation: messageAppear 0.2s ease;
        }

        .profile-menu-header {
            padding: 20px;
            text-align: center;
            background: var(--accent-gradient);
            border-radius: 20px 20px 0 0;
        }

        .profile-menu-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 10px;
        }

        .profile-menu-name {
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        .profile-menu-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
            color: var(--text-primary);
        }

        .profile-menu-item:hover {
            background: var(--bg-tertiary);
        }

        .theme-switch {
            display: flex;
            justify-content: space-between;
        }

        .theme-option {
            padding: 4px 12px;
            border-radius: 20px;
            background: var(--bg-tertiary);
            cursor: pointer;
            font-size: 12px;
        }

        .theme-option.active {
            background: var(--accent-color);
            color: white;
        }

        /* Вкладки */
        .panel-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
        }

        .panel-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: bold;
        }

        .panel-tab.active {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
        }

        .panel-tab.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
        }

        .panel-content.hidden {
            display: none;
        }

        /* Диалоги */
        .dialog-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid var(--border-color);
        }

        .dialog-item:hover, .dialog-item.active {
            background: var(--bg-tertiary);
        }

        .dialog-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .dialog-info {
            flex: 1;
        }

        .dialog-name {
            color: var(--text-primary);
            font-weight: bold;
            font-size: 15px;
        }

        .dialog-last-message {
            color: var(--text-secondary);
            font-size: 12px;
            margin-top: 4px;
        }

        /* Основной чат */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-secondary);
        }

        .chat-header-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-info h3 {
            color: var(--text-primary);
            font-size: 16px;
        }

        .chat-header-info p {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .call-btn {
            background: linear-gradient(135deg, #28a745, #20c997);
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Сообщения */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            word-wrap: break-word;
            animation: messageAppear 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .message.my-message {
            background: var(--accent-color);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            animation: messageAppearMy 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .message.other-message {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
            margin: 5px 0;
        }

        .message-audio {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 30px;
        }

        .audio-play {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: inherit;
        }

        .audio-timer {
            font-size: 12px;
            font-family: monospace;
        }

        .message-sender {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.6;
            text-align: right;
        }

        /* Панель ввода */
        .message-input-area {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            background: var(--bg-secondary);
        }

        .attach-btn {
            background: var(--bg-tertiary);
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 10px 15px;
            border-radius: 30px;
            transition: transform 0.2s;
        }

        .attach-btn:active {
            transform: scale(0.95);
        }

        .message-input-area input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 30px;
            border: none;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }

        .message-input-area button {
            padding: 12px 20px;
            border-radius: 30px;
            border: none;
            background: var(--accent-color);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        /* Модалка для просмотра картинки */
        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            cursor: pointer;
        }

        .image-modal.hidden {
            display: none;
        }

        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 20px;
        }

        /* Запись голоса */
        .recording-indicator {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--danger-color);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            animation: pulse 1s infinite;
        }

        .recording-indicator.hidden {
            display: none;
        }

        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast-notification.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .register-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .register-box {
            background: var(--bg-secondary);
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .register-box input {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 16px;
            margin: 20px 0;
            text-align: center;
        }

        .register-box button {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: var(--accent-gradient);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .users-panel {
                position: fixed;
                left: -320px;
                top: 0;
                height: 100%;
                z-index: 200;
                transition: left 0.3s;
            }
            .users-panel.open {
                left: 0;
            }
            .menu-btn {
                display: block;
                position: fixed;
                top: 20px;
                left: 20px;
                z-index: 300;
                background: var(--accent-color);
                border: none;
                color: white;
                font-size: 24px;
                padding: 10px 15px;
                border-radius: 30px;
                cursor: pointer;
            }
            .message {
                max-width: 85%;
            }
            .call-btn span {
                display: none;
            }
        }

        @media (min-width: 769px) {
            .menu-btn {
                display: none;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 10px;
        }
    </style>
</head>

                <div class="coming-soon" style="text-align: center; padding: 40px;">

        <div class="chat-main">

    <!-- Индикатор записи -->
    <div id="recordingIndicator" class="recording-indicator hidden">

        <span id="recordingTimer">0:00</span>
    </div>

    <div id="toastNotification" class="toast-notification">
        <span id="toastMessage"></span>
    </div>

    <div id="imageModal" class="image-modal hidden">
        <img id="modalImage" src="">
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    
    <script>
        // ========== FIREBASE КЛЮЧИ ==========
        const firebaseConfig = {
  apiKey: "AIzaSyD8UUafDtOr6mof098U0uW8yhRLIv76zZY",
  authDomain: "mim-b31d1.firebaseapp.com",
  databaseURL: "https://mim-b31d1-default-rtdb.firebaseio.com",
  projectId: "mim-b31d1",
  storageBucket: "mim-b31d1.firebasestorage.app",
  messagingSenderId: "1030925152892",
  appId: "1:1030925152892:web:1c248bf39186a7006d4ff9"
};
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const storage = firebase.storage();
        
        // ========== ПЕРЕМЕННЫЕ ==========
        let myId = null;
        let myNickname = null;
        let myAvatar = '😀';
        let currentChatId = null;
        let currentChatType = null;
        let users = {};
        let currentMessagesRef = null;
        
        // Для записи голоса
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let recordingStartTime = null;
        let recordingInterval = null;
        
        const avatars = ['😀', '😎', '🥳', '😺', '🦊', '🐼', '🌟', '🎮', '⚽', '🎵', '📚', '🎨'];
        
        function getRandomAvatar() {
            return avatars[Math.floor(Math.random() * avatars.length)];
        }
        
        function showToast(message, isError = false) {
            const toast = document.getElementById('toastNotification');
            const toastMsg = document.getElementById('toastMessage');
            toastMsg.textContent = message;
            toast.style.background = isError ? '#ff4757' : 'linear-gradient(135deg, #28a745, #20c997)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // ========== ТЕМА ==========
        function initTheme() {
            const saved = localStorage.getItem('minigram_theme') || 'dark';
            document.body.classList.remove('dark', 'light');
            document.body.classList.add(saved);
            document.querySelectorAll('.theme-option').forEach(opt => {
                opt.classList.toggle('active', opt.dataset.theme === saved);
            });
        }
        
        function setTheme(theme) {
            document.body.classList.remove('dark', 'light');
            document.body.classList.add(theme);
            localStorage.setItem('minigram_theme', theme);
            document.querySelectorAll('.theme-option').forEach(opt => {
                opt.classList.toggle('active', opt.dataset.theme === theme);
            });
        }
        
        // ========== ПРОФИЛЬ ==========
        function toggleProfileMenu() {
            document.getElementById('profileMenu').classList.toggle('show');
        }
        
        function logout() {
            if (confirm('Выйти?')) {
                localStorage.removeItem('minigram_user');
                if (myId) database.ref('users/' + myId).update({ online: false });
                location.reload();
            }
        }
        
        // ========== РЕГИСТРАЦИЯ ==========
        function register() {
            const nickname = document.getElementById('nicknameInput').value.trim();
            if (!nickname || nickname.length < 2) {
                document.getElementById('registerError').textContent = '❌ Минимум 2 символа';
                return;
            }
            
            myId = Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            myNickname = nickname;
            myAvatar = getRandomAvatar();
            
            database.ref('users/' + myId).set({
                id: myId, nickname: myNickname, avatar: myAvatar, online: true, lastSeen: Date.now()
            });
            localStorage.setItem('minigram_user', JSON.stringify({ id: myId, nickname: myNickname, avatar: myAvatar }));
            
            document.getElementById('registerOverlay').style.display = 'none';
            document.getElementById('chatContainer').style.display = 'flex';
            document.getElementById('profileAvatar').textContent = myAvatar;
            document.getElementById('menuAvatar').textContent = myAvatar;
            document.getElementById('menuName').textContent = myNickname;
            
            initApp();
        }
        
        function checkExistingUser() {
            const saved = localStorage.getItem('minigram_user');
            if (saved) {
                const user = JSON.parse(saved);
                myId = user.id;
                myNickname = user.nickname;
                myAvatar = user.avatar || getRandomAvatar();
                database.ref('users/' + myId).update({ online: true, lastSeen: Date.now() });
                document.getElementById('registerOverlay').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'flex';
                document.getElementById('profileAvatar').textContent = myAvatar;
                document.getElementById('menuAvatar').textContent = myAvatar;
                document.getElementById('menuName').textContent = myNickname;
                initApp();
            }
        }
        
        // ========== ЗАГРУЗКА ПОЛЬЗОВАТЕЛЕЙ ==========
        function loadUsers() {
            database.ref('users').on('value', (snapshot) => {
                users = snapshot.val() || {};
                renderDialogs();
            });
        }
        
        function renderDialogs() {
            const container = document.getElementById('dialogsList');
            const usersList = Object.values(users).filter(u => u.id !== myId);
            if (usersList.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center;">👥 Нет других пользователей</div>';
                return;
            }
            container.innerHTML = usersList.map(user => `
                <div class="dialog-item ${currentChatId === user.id ? 'active' : ''}" onclick="selectChat('${user.id}')">
                    <div class="dialog-avatar">${user.avatar || '😀'}</div>
                    <div class="dialog-info">
                        <div class="dialog-name">${escapeHtml(user.nickname)}</div>
                        <div class="dialog-last-message">${user.online ? '🟢 Онлайн' : '⚫ Офлайн'}</div>
                    </div>
                </div>
            `).join('');
        }
        
        // ========== ВЫБОР ЧАТА ==========
        window.selectChat = function(id) {
            if (currentMessagesRef) currentMessagesRef.off();
            currentChatId = id;
            currentChatType = 'user';
            
            renderDialogs();
            
            const user = users[id];
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('messageInputArea').style.display = 'flex';
            document.getElementById('chatUserName').textContent = user.nickname;
            document.getElementById('chatAvatar').textContent = user.avatar || '😀';
            document.getElementById('chatUserStatus').innerHTML = user.online ? '🟢 Онлайн' : '⚫ Офлайн';
            document.getElementById('messagesArea').innerHTML = '';
            
            loadMessages();
        };
        
        function getChatRef() {
            if (!currentChatId) return null;
            const chatId = [myId, currentChatId].sort().join('_');
            return database.ref('messages/' + chatId);
        }
        
        function loadMessages() {
            const chatRef = getChatRef();
            if (!chatRef) return;
            currentMessagesRef = chatRef;
            
            chatRef.limitToLast(50).once('value', (snapshot) => {
                const messages = snapshot.val();
                if (messages) Object.values(messages).forEach(m => displayMessage(m));
            });
            
            chatRef.on('child_added', (snapshot) => {
                const msg = snapshot.val();
                if (!document.querySelector(`[data-msg-id="${msg.id}"]`)) displayMessage(msg);
            });
        }
        
        function displayMessage(message) {
            const container = document.getElementById('messagesArea');
            const isMy = message.senderId === myId;
            const date = new Date(message.timestamp);
            const timeStr = `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
            
            if (container.children.length === 1 && container.children[0].innerText.includes('Выберите чат')) {
                container.innerHTML = '';
            }
            
            const div = document.createElement('div');
            div.className = `message ${isMy ? 'my-message' : 'other-message'}`;
            div.setAttribute('data-msg-id', message.id);
            
            let content = '';
            if (message.type === 'image') {
                content = `<img src="${message.imageUrl}" class="message-image" onclick="openImageModal('${message.imageUrl}')">`;
            } else if (message.type === 'audio') {
                content = `
                    <div class="message-audio">
                        <button class="audio-play" onclick="playAudio(this, '${message.audioUrl}')">▶️</button>
                        <span>🎤 Голосовое сообщение</span>
                        <span class="audio-timer"></span>
                    </div>
                `;
            } else {
                content = escapeHtml(message.text);
            }
            
            div.innerHTML = `
                ${!isMy ? `<div class="message-sender">${escapeHtml(message.senderNickname)}</div>` : ''}
                ${content}
                <div class="message-time">${timeStr}</div>
            `;
            container.appendChild(div);
            div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        // ========== ОТПРАВКА СООБЩЕНИЙ ==========
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentChatId) return;
            
            const message = {
                id: Date.now() + '_' + Math.random(),
                senderId: myId,
                senderNickname: myNickname,
                text: text,
                timestamp: Date.now(),
                type: 'text'
            };
            getChatRef().push(message);
            input.value = '';
        }
        
        async function sendImage(file) {
            if (!file || !currentChatId) return;
            const filename = `${Date.now()}_${file.name}`;
            const storageRef = storage.ref(`images/${currentChatId}/${filename}`);
            const upload = await storageRef.put(file);
            const imageUrl = await upload.ref.getDownloadURL();
            
            const message = {
                id: Date.now() + '_' + Math.random(),
                senderId: myId,
                senderNickname: myNickname,
                imageUrl: imageUrl,
                timestamp: Date.now(),
                type: 'image'
            };
            getChatRef().push(message);
            showToast('📷 Картинка отправлена!');
        }
        
        async function sendAudio(audioBlob) {
            if (!audioBlob || !currentChatId) return;
            const filename = `${Date.now()}_audio.webm`;
            const storageRef = storage.ref(`audio/${currentChatId}/${filename}`);
            const upload = await storageRef.put(audioBlob);
            const audioUrl = await upload.ref.getDownloadURL();
            
            const message = {
                id: Date.now() + '_' + Math.random(),
                senderId: myId,
                senderNickname: myNickname,
                audioUrl: audioUrl,
                timestamp: Date.now(),
                type: 'audio'
            };
            getChatRef().push(message);
            showToast('🎤 Голосовое отправлено!');
        }
        
        // ========== ЗАПИСЬ ГОЛОСА ==========
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    sendAudio(audioBlob);
                    stream.getTracks().forEach(t => t.stop());
                };
                
                mediaRecorder.start();
                isRecording = true;
                recordingStartTime = Date.now();
                
                document.getElementById('recordingIndicator').classList.remove('hidden');
                recordingInterval = setInterval(updateRecordingTimer, 1000);
            } catch(e) {
                showToast('❌ Нет доступа к микрофону', true);
            }
        }
        
        function updateRecordingTimer() {
            const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            document.getElementById('recordingTimer').textContent = `${minutes}:${seconds.toString().padStart(2,'0')}`;
        }
        
        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                clearInterval(recordingInterval);
                document.getElementById('recordingIndicator').classList.add('hidden');
            }
        }
        
        // ========== ВСПОМОГАТЕЛЬНЫЕ ==========
        window.openImageModal = function(url) {
            const modal = document.getElementById('imageModal');
            const img = document.getElementById('modalImage');
            img.src = url;
            modal.classList.remove('hidden');
        };
        
        window.playAudio = function(btn, url) {
            const audio = new Audio(url);
            audio.play();
            btn.textContent = '⏸️';
            audio.onended = () => btn.textContent = '▶️';
        };
        
        function sendInvite() {
            if (!currentChatId) { showToast('❌ Выберите чат'); return; }
            const user = users[currentChatId];
            const message = {
                id: Date.now() + '_' + Math.random(),
                senderId: myId,
                senderNickname: myNickname,
                text: `🔔 ${myNickname} зовёт вас в чат!`,
                timestamp: Date.now(),
                type: 'text',
                isInvite: true
            };
            getChatRef().push(message);
            showToast(`📞 Приглашение отправлено ${user.nickname}!`);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function initTabs() {
            document.querySelectorAll('.panel-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    if (tab.classList.contains('disabled')) {
                        showToast('🔧 В разработке!');
                        return;
                    }
                    document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    document.querySelectorAll('.panel-content').forEach(p => p.classList.add('hidden'));
                    document.getElementById(`${tab.dataset.tab}Panel`).classList.remove('hidden');
                });
            });
        }
        
        function initMobileMenu() {
            const menuBtn = document.getElementById('menuBtn');
            const panel = document.getElementById('usersPanel');
            menuBtn?.addEventListener('click', () => panel.classList.toggle('open'));
            document.addEventListener('click', (e) => {
                if (window.innerWidth <= 768 && e.target.closest('.dialog-item')) panel.classList.remove('open');
                if (!e.target.closest('.profile-area')) document.getElementById('profileMenu').classList.remove('show');
            });
        }
        
        function updateOnlineStatus() {
            setInterval(() => {
                if (myId) database.ref('users/' + myId).update({ online: true, lastSeen: Date.now() });
            }, 10000);
            window.addEventListener('beforeunload', () => {
                if (myId) database.ref('users/' + myId).update({ online: false });
            });
        }
        
        function initApp() {
            loadUsers();
            updateOnlineStatus();
            initTabs();
            initMobileMenu();
            initTheme();
            
            document.getElementById('sendBtn').onclick = sendMessage;
            document.getElementById('messageInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
            document.getElementById('callBtn').onclick = sendInvite;
            document.getElementById('profileArea').onclick = toggleProfileMenu;
            document.getElementById('logoutMenuItem').onclick = logout;
            document.getElementById('imageModal').onclick = () => document.getElementById('imageModal').classList.add('hidden');
            
            document.getElementById('attachImageBtn').onclick = () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = (e) => sendImage(e.target.files[0]);
                input.click();
            };
            
            let audioBtn = document.getElementById('attachAudioBtn');
            audioBtn.onmousedown = startRecording;
            audioBtn.onmouseup = stopRecording;
            audioBtn.ontouchstart = startRecording;
            audioBtn.ontouchend = stopRecording;
            
            document.querySelectorAll('.theme-option').forEach(opt => {
                opt.addEventListener('click', (e) => {
                    e.stopPropagation();
                    setTheme(opt.dataset.theme);
                });
            });
        }
        
        document.getElementById('registerBtn').onclick = register;
        document.getElementById('nicknameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') register();
        });
        
        checkExistingUser();
    </script>
</body>
</html>
