<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiteMaker — создай свой сайт онлайн</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="toolbar">
        <div class="logo">✨ SiteMaker</div>
        <div class="toolbar-buttons">
            <button id="editorBtn" class="editor-btn">✏️ Редактор</button>
            <button id="exitEditorBtn" class="exit-btn" style="display:none;">🔒 Выйти из редактора</button>
            <button id="onlineCount" class="online-btn">👥 0 онлайн</button>
        </div>
    </div>

    <!-- Сама страница (то, что видят все) -->
    <div id="pageContent" class="page-content">
        <div class="welcome-message">
            <h1>✨ Добро пожаловать в SiteMaker!</h1>
            <p>Нажми на кнопку "Редактор", чтобы начать создавать свой сайт</p>
            <p>Все изменения видны всем онлайн!</p>
        </div>
    </div>

    <!-- Панель редактора (появляется при клике) -->
    <div id="editorPanel" class="editor-panel hidden">
        <div class="editor-header">
            <h3>🎨 Редактор сайта</h3>
            <button id="closeEditorBtn" class="close-editor">✖️</button>
        </div>
        <div class="editor-tools">
            <div class="tool-group">
                <h4>➕ Добавить блок</h4>
                <button id="addTextBtn" class="tool-btn">📝 Текст</button>
                <button id="addTitleBtn" class="tool-btn">📌 Заголовок</button>
                <button id="addButtonBtn" class="tool-btn">🔘 Кнопка</button>
                <button id="addImageBtn" class="tool-btn">🖼️ Картинка</button>
                <button id="addHtmlBtn" class="tool-btn">💻 HTML код</button>
            </div>
            <div class="tool-group">
                <h4>🎨 Стили</h4>
                <label>Цвет фона:</label>
                <input type="color" id="bgColor" value="#ffffff">
                <label>Цвет текста:</label>
                <input type="color" id="textColor" value="#000000">
                <label>Шрифт:</label>
                <select id="fontFamily">
                    <option value="Arial">Arial</option>
                    <option value="Georgia">Georgia</option>
                    <option value="Courier New">Courier New</option>
                    <option value="system-ui">Системный</option>
                </select>
            </div>
            <div class="tool-group">
                <h4>⚡ Управление</h4>
                <button id="clearSiteBtn" class="tool-btn danger">🗑️ Очистить сайт</button>
                <button id="saveSiteBtn" class="tool-btn success">💾 Сохранить</button>
            </div>
        </div>
    </div>

    <!-- Модалка для ввода текста/ссылки -->
    <div id="inputModal" class="modal hidden">
        <div class="modal-content small">
            <h3 id="modalTitle">Введите текст</h3>
            <input type="text" id="modalInput" placeholder="Текст...">
            <input type="text" id="modalInput2" placeholder="Ссылка (для кнопки)" style="display:none;">
            <div class="modal-buttons">
                <button id="modalOkBtn">OK</button>
                <button id="modalCancelBtn">Отмена</button>
            </div>
        </div>
    </div>

    <!-- Индикатор мышки -->
    <div id="mouseCursor" class="custom-cursor"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
